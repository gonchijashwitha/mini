<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Portfolio Contacts</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; background: #111; color: #eee; }
    h1, h2 { margin: 0 0 1rem; }
    .card { background: #1d1d1d; border: 1px solid #333; padding: 1rem; margin-bottom: 1.5rem; }
    table { width: 100%; border-collapse: collapse; background: #1d1d1d; }
    th, td { border: 1px solid #333; padding: 0.75rem; text-align: left; vertical-align: top; }
    th { background: #232323; }
    .muted { color: #aaa; }
  </style>
</head>
<body>
  <h1>Portfolio Admin</h1>
  <div class="card">
    <h2>Visitor Count: {{ visitors }}</h2>
  </div>

  <div class="card">
    <h2>Contact Messages</h2>
    {% if contacts %}
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Message</th>
          <th>Created At</th>
        </tr>
      </thead>
      <tbody>
        {% for c in contacts %}
        <tr>
          <td>{{ c.name }}</td>
          <td>{{ c.email }}</td>
          <td>{{ c.message }}</td>
          <td>{{ c.created_at }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    {% else %}
    <p class="muted">No contact messages yet.</p>
    {% endif %}
  </div>
</body>
</html>
